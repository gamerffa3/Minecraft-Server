name: Advanced Paper Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reset_data:
        description: 'Reset all data (world, plugins, config)'
        type: boolean
        default: false
      server_mode:
        description: 'Server mode'
        type: choice
        options:
          - survival
          - creative
          - adventure
        default: survival
      tailscale_connect:
        description: 'Connect to Tailscale?'
        type: choice
        options:
          - 'yes'
          - 'no'
        default: 'yes'
      tailscale_auth_key:
        description: 'Tailscale Auth Key (tskey-auth-xxxxx)'
        type: string
        required: false
        default: ''

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      # ============================================
      # 🔗 TAILSCALE SETUP WITH OPTION
      # ============================================
      - name: Setup Tailscale
        if: github.event.inputs.tailscale_connect == 'yes'
        run: |
          echo "🔗 Installing Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          
          # Use provided auth key or try secrets
          AUTH_KEY="${{ github.event.inputs.tailscale_auth_key }}"
          if [ -z "$AUTH_KEY" ]; then
            AUTH_KEY="${{ secrets.TAILSCALE_AUTH_KEY }}"
          fi
          
          if [ -n "$AUTH_KEY" ]; then
            echo "🔗 Connecting to Tailscale with auth key..."
            sudo tailscale up --auth-key="$AUTH_KEY" --accept-routes --accept-dns
            TAILSCALE_IP=$(tailscale ip 2>/dev/null || echo "Unknown")
            echo "✅ Tailscale connected! IP: $TAILSCALE_IP"
            
            # Save IP for later steps
            echo "TAILSCALE_IP=$TAILSCALE_IP" >> $GITHUB_ENV
          else
            echo "⚠️ No Tailscale auth key provided!"
            echo ""
            echo "========================================="
            echo "🔗 HOW TO GET TAILSCALE AUTH KEY:"
            echo "========================================="
            echo "1. Go to: https://login.tailscale.com/admin/settings/keys"
            echo "2. Click 'Generate auth key'"
            echo "3. Copy the key (starts with 'tskey-auth-')"
            echo "4. Add it as a GitHub Secret:"
            echo "   Settings → Secrets → TAILSCALE_AUTH_KEY"
            echo "========================================="
            echo ""
            exit 1
          fi
      
      # ============================================
      # 🗑️ RESET DATA (if requested)
      # ============================================
      - name: Reset Data
        if: github.event.inputs.reset_data == 'true'
        run: |
          echo "🗑️ Resetting all server data..."
          rm -rf server/
          rm -rf backups/
          mkdir -p backups
          echo "✅ Data reset complete!"
      
      # ============================================
      # 📥 DOWNLOAD LATEST BACKUP
      # ============================================
      - name: Download Latest Backup
        if: github.event.inputs.reset_data != 'true'
        uses: actions/download-artifact@v4
        with:
          name: minecraft-backup
          path: server/
        continue-on-error: true
      
      # ============================================
      # 🛠️ COMPLETE SERVER SETUP
      # ============================================
      - name: Complete Server Setup
        run: |
          mkdir -p server
          cd server
          
          # Create all folders
          mkdir -p plugins
          mkdir -p world
          mkdir -p world_nether
          mkdir -p world_the_end
          mkdir -p logs
          mkdir -p config
          
          # Copy uploaded plugins
          echo "📦 Copying plugins..."
          cp ../*.jar plugins/ 2>/dev/null || true
          
          # Download Playit Agent (optional)
          echo "📥 Downloading Playit Agent..."
          wget -q https://playit.gg/download/playit-linux-amd64 -O playit-agent || true
          chmod +x playit-agent 2>/dev/null || true
          
          # Download Paper
          if [ ! -f "paper-1.21.4-72.jar" ]; then
            echo "📥 Downloading Paper..."
            wget -q https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/72/downloads/paper-1.21.4-72.jar
          fi
          
          # Accept EULA
          echo "eula=true" > eula.txt
          
          # Set gamemode
          if [ "${{ github.event.inputs.server_mode }}" == "creative" ]; then
            GM=1
          elif [ "${{ github.event.inputs.server_mode }}" == "adventure" ]; then
            GM=2
          else
            GM=0
          fi
          
          # Get Tailscale IP
          TAILSCALE_IP="${TAILSCALE_IP:-localhost}"
          
          # Complete server.properties
          cat > server.properties << EOF
          # Minecraft server properties
          server-port=25565
          max-players=50
          view-distance=12
          simulation-distance=8
          gamemode=$GM
          difficulty=3
          spawn-protection=16
          online-mode=false
          force-gamemode=false
          allow-flight=true
          allow-nether=true
          allow-end=true
          level-name=world
          level-type=default
          motd=Welcome to Advanced Paper Server! | 🔗 $TAILSCALE_IP
          enable-query=true
          enable-rcon=true
          rcon-password=${{ secrets.RCON_PASSWORD }}
          rcon-port=25575
          max-tick-time=60000
          network-compression-threshold=256
          EOF
          
          # Create server-icon.png
          echo "iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAI0lEQVR4nO3BAQ0AAADCoPdPbQ43oAAAAAAAAAAAAG4NFeAAAW2v83YAAAAASUVORK5CYII=" | base64 -d > server-icon.png
          
          # Create connection info file
          cat > CONNECTION_INFO.txt << EOF
          =========================================
          🎮 MINECRAFT SERVER CONNECTION INFO
          =========================================
          🌐 Server IP: $TAILSCALE_IP
          🔌 Port: 25565
          🎮 Mode: ${{ github.event.inputs.server_mode }}
          📂 Plugins: $(ls plugins/ | wc -l)
          =========================================
          🔗 To connect:
          1. Open Minecraft
          2. Add Server
          3. IP: $TAILSCALE_IP
          4. Port: 25565
          =========================================
          EOF
          
          echo "========================================="
          echo "📦 SERVER SETUP COMPLETE"
          echo "========================================="
          echo "🎮 Gamemode: ${{ github.event.inputs.server_mode }}"
          echo "📂 Plugins: $(ls plugins/ | wc -l) files"
          echo "🔗 Tailscale IP: $TAILSCALE_IP"
          echo "========================================="
      
      # ============================================
      # 🚀 RUN SERVER WITH TAILSCALE
      # ============================================
      - name: Run Server
        run: |
          cd server
          
          # Start Playit agent (if exists)
          if [ -f "./playit-agent" ]; then
            echo "🚀 Starting Playit agent..."
            ./playit-agent &
          fi
          
          sleep 3
          
          # Show connection info
          cat CONNECTION_INFO.txt
          
          # Health check thread
          (
            while true; do
              sleep 300
              echo "💚 Server health check: $(date)"
              echo "📊 Memory: $(free -h | grep Mem | awk '{print $3 "/" $2}')"
              echo "📊 CPU: $(top -bn1 | grep "Cpu(s)" | awk '{print $2 "%"}')"
            done
          ) &
          
          # Start Paper server
          echo "🚀 Starting Paper server..."
          java -Djava.net.preferIPv4Stack=true -Xmx8G -Xms4G -jar paper-1.21.4-72.jar nogui
      
      # ============================================
      # 💾 AUTO BACKUP
      # ============================================
      - name: Auto Backup
        if: always()
        run: |
          BACKUP_NAME="backup-$(date +'%Y-%m-%d_%H-%M-%S')"
          echo "📦 Creating backup: $BACKUP_NAME"
          
          mkdir -p backups
          
          cd server
          zip -r "../backups/$BACKUP_NAME.zip" . -x "*.jar" "*.log" "*.gz" "*.tmp" "cache/*" 2>/dev/null || true
          cd ..
          
          cp "backups/$BACKUP_NAME.zip" "backups/latest.zip"
          
          echo "✅ Backup created: $BACKUP_NAME.zip"
      
      # ============================================
      # 📤 UPLOAD BACKUPS
      # ============================================
      - name: Upload Latest Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-backup
          path: backups/latest.zip
          retention-days: 90
      
      - name: Upload All Backups
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-backups-${{ github.run_id }}
          path: backups/
          retention-days: 30
      
      # ============================================
      # 📤 PUSH TO BACKUP BRANCH (Fixed Permission)
      # ============================================
      - name: Push Backup to Repository
        if: always()
        run: |
          echo "📤 Pushing backups to repository..."
          
          # Configure git with token
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Use GITHUB_TOKEN for authentication
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          # Create or switch to backups branch
          git checkout -b backups || git checkout backups
          
          # Copy backups
          mkdir -p backup-repo
          cp -r backups/* backup-repo/ 2>/dev/null || true
          
          # Add and commit
          git add backup-repo/
          git commit -m "Auto backup: $(date -Iseconds)" || echo "No changes to commit"
          
          # Push
          git push origin backups || echo "Push failed, but continuing..."
      
      # ============================================
      # 📊 SERVER STATS
      # ============================================
      - name: Server Stats
        if: always()
        run: |
          echo "========================================="
          echo "📊 SERVER STATS"
          echo "========================================="
          echo "📁 Server folder size: $(du -sh server/ | cut -f1)"
          echo "📁 Backups size: $(du -sh backups/ | cut -f1)"
          echo "📂 Total plugins: $(ls -1 server/plugins/ 2>/dev/null | wc -l)"
          echo "========================================="
