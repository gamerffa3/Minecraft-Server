name: Paper Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Download Previous Server Data
        uses: actions/download-artifact@v4
        with:
          name: minecraft-server-data
          path: server/
        continue-on-error: true
      
      - name: Setup Server with Plugins
        run: |
          mkdir -p server
          cd server
          
          # Create plugins folder
          mkdir -p plugins
          
          # ========================================
          # 📦 COPY UPLOADED PLUGINS
          # ========================================
          echo "📦 Copying plugins from repository..."
          cp ../*.jar plugins/ 2>/dev/null || true
          
          # ========================================
          # 📥 DOWNLOAD PAPER
          # ========================================
          if [ ! -f "paper-1.21.4-72.jar" ]; then
            wget https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/72/downloads/paper-1.21.4-72.jar
          fi
          
          # ========================================
          # ⚙️ SERVER CONFIGURATION
          # ========================================
          
          # Accept EULA
          echo "eula=true" > eula.txt
          
          # Create server.properties
          cat > server.properties << 'EOF'
          # Minecraft server properties
          server-port=25565
          max-players=20
          view-distance=10
          simulation-distance=6
          
          # GAMEMODE = SURVIVAL (0)
          gamemode=0
          difficulty=2
          spawn-protection=16
          
          # PLAYER SETTINGS
          online-mode=false
          force-gamemode=false
          allow-flight=true
          allow-nether=true
          allow-end=true
          
          # WORLD SETTINGS
          level-name=world
          level-type=default
          
          # OTHER
          motd=Welcome to Paper Server! 🚀
          enable-query=true
          enable-rcon=false
          max-tick-time=60000
          network-compression-threshold=256
          EOF
          
          # ========================================
          # 📋 LIST PLUGINS
          # ========================================
          echo "========================================="
          echo "📦 PLUGINS LOADED:"
          ls -la plugins/
          echo "========================================="
      
      - name: Run Paper Server with Playit.gg Tunnel
        run: |
          cd server
          
          # Start Playit.gg tunnel in background
          echo "🚀 Starting Playit.gg tunnel..."
          ./playit-linux-amd64 --secret ${{ secrets.PLAYIT_SECRET }} &
          
          # Wait for tunnel to start
          sleep 5
          
          # Start Paper server
          echo "🚀 Starting Paper server..."
          java -Xmx8G -Xms4G -jar paper-1.21.4-72.jar nogui
      
      - name: Upload Server Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-server-data
          path: server/
          retention-days: 90
