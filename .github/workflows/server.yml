name: Paper Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      # ============================================
      # 📥 DOWNLOAD LATEST BACKUP
      # ============================================
      - name: Download Latest Backup
        uses: actions/download-artifact@v4
        with:
          name: minecraft-backup
          path: server/
        continue-on-error: true
      
      # ============================================
      # 🛠️ SETUP SERVER
      # ============================================
      - name: Setup Server
        run: |
          mkdir -p server
          cd server
          
          # Create plugins folder
          mkdir -p plugins
          
          # Copy uploaded plugins
          echo "📦 Copying plugins..."
          cp ../*.jar plugins/ 2>/dev/null || true
          
          # Download Paper if not exists
          if [ ! -f "paper-1.21.4-72.jar" ]; then
            echo "📥 Downloading Paper..."
            wget -q https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/72/downloads/paper-1.21.4-72.jar
          fi
          
          # Accept EULA
          echo "eula=true" > eula.txt
          
          # Create server.properties
          cat > server.properties << 'EOF'
          # Minecraft server properties
          server-port=25565
          max-players=20
          view-distance=10
          simulation-distance=6
          gamemode=0
          difficulty=2
          spawn-protection=16
          online-mode=false
          force-gamemode=false
          allow-flight=true
          allow-nether=true
          allow-end=true
          level-name=world
          level-type=default
          motd=Welcome to Paper Server!
          enable-query=true
          enable-rcon=false
          max-tick-time=60000
          network-compression-threshold=256
          EOF
          
          # Create server-icon.png
          echo "iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAI0lEQVR4nO3BAQ0AAADCoPdPbQ43oAAAAAAAAAAAAG4NFeAAAW2v83YAAAAASUVORK5CYII=" | base64 -d > server-icon.png
          
          echo "========================================="
          echo "📦 PLUGINS LOADED:"
          ls -la plugins/ 2>/dev/null || echo "No plugins found"
          echo "========================================="
      
      # ============================================
      # 🚀 RUN SERVER
      # ============================================
      - name: Run Paper Server
        run: |
          cd server
          echo "🚀 Starting Paper server..."
          java -Djava.net.preferIPv4Stack=true -Xmx8G -Xms4G -jar paper-1.21.4-72.jar nogui
      
      # ============================================
      # 💾 CREATE BACKUP WITH DATE & TIME
      # ============================================
      - name: Create Backup
        if: always()
        run: |
          # Get current date and time
          BACKUP_NAME="backup-$(date +'%Y-%m-%d_%H-%M-%S')"
          echo "📦 Creating backup: $BACKUP_NAME"
          
          # Create backup directory
          mkdir -p backups
          
          # Zip the server folder
          cd server
          zip -r "../backups/$BACKUP_NAME.zip" . -x "*.jar" "*.log" "*.gz" 2>/dev/null || true
          cd ..
          
          # Create a latest symlink (for easy restore)
          cp "backups/$BACKUP_NAME.zip" "backups/latest.zip"
          
          echo "✅ Backup created: $BACKUP_NAME.zip"
          echo "📂 Backup size: $(du -h backups/$BACKUP_NAME.zip | cut -f1)"
      
      # ============================================
      # 📤 UPLOAD BACKUP
      # ============================================
      - name: Upload Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-backup
          path: backups/latest.zip
          retention-days: 90
      
      # ============================================
      # 📤 UPLOAD ALL BACKUPS (Optional)
      # ============================================
      - name: Upload All Backups
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-all-backups
          path: backups/
          retention-days: 30
