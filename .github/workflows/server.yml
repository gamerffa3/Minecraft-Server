name: Paper Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Download and Run Paper
        run: |
          mkdir server
          cd server
          
          wget https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/72/downloads/paper-1.21.4-72.jar
          
          echo "eula=true" > eula.txt
          
          echo "server-port=25565" > server.properties
          echo "online-mode=false" >> server.properties
          echo "max-players=10" >> server.properties
          echo "view-distance=10" >> server.properties
          
          java -Xmx8G -Xms4G -jar paper-1.21.4-72.jar nogui
      
      - name: Upload Server Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-server-data
          path: server/
          retention-days: 30
