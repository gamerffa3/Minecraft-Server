name: Advanced Paper Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      reset_data:
        description: 'Reset all data (world, plugins, config)'
        type: boolean
        default: false
      server_mode:
        description: 'Server mode'
        type: choice
        options:
          - survival
          - creative
          - adventure
        default: survival
      tailscale_connect:
        description: 'Connect to Tailscale?'
        type: choice
        options:
          - 'yes'
          - 'no'
        default: 'yes'

# ============================================
# ✅ PERMISSIONS - TAILSCALE KE LIYE
# ============================================
permissions:
  id-token: write
  contents: read

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      # ============================================
      # 🔗 TAILSCALE - OFFICIAL ACTION
      # ============================================
      - name: Tailscale
        if: github.event.inputs.tailscale_connect == 'yes'
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          tags: tag:ci
          hostname: minecraft-server

      - name: Get Tailscale IP
        if: github.event.inputs.tailscale_connect == 'yes'
        run: |
          TAILSCALE_IP=$(tailscale ip 2>/dev/null || echo "Unknown")
          echo "TAILSCALE_IP=$TAILSCALE_IP" >> $GITHUB_ENV
          echo "✅ Tailscale IP: $TAILSCALE_IP"
      
      # ============================================
      # 🗑️ RESET DATA (if requested)
      # ============================================
      - name: Reset Data
        if: github.event.inputs.reset_data == 'true'
        run: |
          echo "🗑️ Resetting all server data..."
          rm -rf server/
          rm -rf backups/
          mkdir -p backups
          echo "✅ Data reset complete!"
      
      # ============================================
      # 📥 DOWNLOAD LATEST BACKUP
      # ============================================
      - name: Download Latest Backup
        if: github.event.inputs.reset_data != 'true'
        uses: actions/download-artifact@v4
        with:
          name: minecraft-backup
          path: server/
        continue-on-error: true
      
      # ============================================
      # 🛠️ COMPLETE SERVER SETUP
      # ============================================
      - name: Complete Server Setup
        run: |
          mkdir -p server
          cd server
          
          # Create all folders
          mkdir -p plugins
          mkdir -p world
          mkdir -p world_nether
          mkdir -p world_the_end
          mkdir -p logs
          mkdir -p config
          
          # Copy uploaded plugins
          echo "📦 Copying plugins..."
          cp ../*.jar plugins/ 2>/dev/null || true
          
          # Download Paper
          if [ ! -f "paper-1.21.4-72.jar" ]; then
            echo "📥 Downloading Paper..."
            wget -q https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/72/downloads/paper-1.21.4-72.jar
          fi
          
          # Accept EULA
          echo "eula=true" > eula.txt
          
          # Set gamemode
          if [ "${{ github.event.inputs.server_mode }}" == "creative" ]; then
            GM=1
          elif [ "${{ github.event.inputs.server_mode }}" == "adventure" ]; then
            GM=2
          else
            GM=0
          fi
          
          # Get Tailscale IP
          TAILSCALE_IP="${TAILSCALE_IP:-localhost}"
          
          # Complete server.properties
          cat > server.properties << EOF
          # Minecraft server properties
          server-port=25565
          max-players=50
          view-distance=12
          simulation-distance=8
          gamemode=$GM
          difficulty=3
          spawn-protection=16
          online-mode=false
          force-gamemode=false
          allow-flight=true
          allow-nether=true
          allow-end=true
          level-name=world
          level-type=default
          motd=Welcome to Advanced Paper Server! | 🔗 $TAILSCALE_IP
          enable-query=true
          enable-rcon=true
          rcon-password=${{ secrets.RCON_PASSWORD }}
          rcon-port=25575
          max-tick-time=60000
          network-compression-threshold=256
          EOF
          
          # Create server-icon.png
          echo "iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAI0lEQVR4nO3BAQ0AAADCoPdPbQ43oAAAAAAAAAAAAG4NFeAAAW2v83YAAAAASUVORK5CYII=" | base64 -d > server-icon.png
          
          echo "========================================="
          echo "📦 SERVER SETUP COMPLETE"
          echo "========================================="
          echo "🎮 Gamemode: ${{ github.event.inputs.server_mode }}"
          echo "📂 Plugins: $(ls plugins/ | wc -l) files"
          echo "🔗 Tailscale IP: $TAILSCALE_IP"
          echo "========================================="
      
      # ============================================
      # 🚀 RUN SERVER
      # ============================================
      - name: Run Server
        run: |
          cd server
          
          # Show connection info
          echo "========================================="
          echo "🎮 SERVER CONNECTION INFO"
          echo "========================================="
          echo "🔗 MagicDNS: minecraft-server.tailscale.net"
          echo "🔌 Port: 25565"
          echo "📡 IP: $(tailscale ip 2>/dev/null || echo 'Unknown')"
          echo "========================================="
          
          # Start Paper server
          echo "🚀 Starting Paper server..."
          java -Djava.net.preferIPv4Stack=true -Xmx8G -Xms4G -jar paper-1.21.4-72.jar nogui
      
      # ============================================
      # 💾 AUTO BACKUP
      # ============================================
      - name: Auto Backup
        if: always()
        run: |
          BACKUP_NAME="backup-$(date +'%Y-%m-%d_%H-%M-%S')"
          echo "📦 Creating backup: $BACKUP_NAME"
          
          mkdir -p backups
          
          cd server
          zip -r "../backups/$BACKUP_NAME.zip" . -x "*.jar" "*.log" "*.gz" "*.tmp" "cache/*" 2>/dev/null || true
          cd ..
          
          cp "backups/$BACKUP_NAME.zip" "backups/latest.zip"
          
          echo "✅ Backup created: $BACKUP_NAME.zip"
      
      # ============================================
      # 📤 UPLOAD BACKUPS
      # ============================================
      - name: Upload Latest Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-backup
          path: backups/latest.zip
          retention-days: 90
      
      - name: Upload All Backups
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-backups-${{ github.run_id }}
          path: backups/
          retention-days: 30
      
      # ============================================
      # 📤 PUSH TO BACKUP BRANCH
      # ============================================
      - name: Push Backup to Repository
        if: always()
        run: |
          echo "📤 Pushing backups to repository..."
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          
          git checkout -b backups || git checkout backups
          
          mkdir -p backup-repo
          cp -r backups/* backup-repo/ 2>/dev/null || true
          
          git add backup-repo/
          git commit -m "Auto backup: $(date -Iseconds)" || echo "No changes"
          git push origin backups || echo "Push failed"
      
      # ============================================
      # 📊 SERVER STATS
      # ============================================
      - name: Server Stats
        if: always()
        run: |
          echo "========================================="
          echo "📊 SERVER STATS"
          echo "========================================="
          echo "📁 Server: $(du -sh server/ 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "📁 Backups: $(du -sh backups/ 2>/dev/null | cut -f1 || echo 'N/A')"
          echo "📂 Plugins: $(ls -1 server/plugins/ 2>/dev/null | wc -l)"
          echo "========================================="
