name: Paper Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Download Previous Server Data
        uses: actions/download-artifact@v4
        with:
          name: minecraft-server-data
          path: server/
        continue-on-error: true
      
      - name: Setup Complete Server
        run: |
          mkdir -p server
          cd server
          
          # Create plugins folder
          mkdir -p plugins
          
          # Copy uploaded plugins
          echo "📦 Copying plugins..."
          cp ../*.jar plugins/ 2>/dev/null || true
          
          # Download Paper if not exists
          if [ ! -f "paper-1.21.4-72.jar" ]; then
            echo "📥 Downloading Paper..."
            wget -q https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/72/downloads/paper-1.21.4-72.jar
          fi
          
          # Accept EULA
          echo "eula=true" > eula.txt
          
          # Create server.properties
          cat > server.properties << 'EOF'
          # Minecraft server properties
          server-port=25565
          max-players=20
          view-distance=10
          simulation-distance=6
          gamemode=0
          difficulty=2
          spawn-protection=16
          online-mode=false
          force-gamemode=false
          allow-flight=true
          allow-nether=true
          allow-end=true
          level-name=world
          level-type=default
          motd=Welcome to Paper Server!
          enable-query=true
          enable-rcon=false
          max-tick-time=60000
          network-compression-threshold=256
          EOF
          
          # Create server-icon.png to avoid icon error
          echo "iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAI0lEQVR4nO3BAQ0AAADCoPdPbQ43oAAAAAAAAAAAAG4NFeAAAW2v83YAAAAASUVORK5CYII=" | base64 -d > server-icon.png
          
          echo "========================================="
          echo "📦 PLUGINS LOADED:"
          ls -la plugins/ 2>/dev/null || echo "No plugins found"
          echo "========================================="
      
      - name: Run Paper Server
        run: |
          cd server
          
          # Force IPv4 to avoid network errors
          echo "🚀 Starting Paper server with IPv4..."
          java -Djava.net.preferIPv4Stack=true -Xmx8G -Xms4G -jar paper-1.21.4-72.jar nogui
      
      - name: Upload Server Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-server-data
          path: server/
          retention-days: 90
