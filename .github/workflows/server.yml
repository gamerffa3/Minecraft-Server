name: Paper Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      # ============================================
      # 📥 DOWNLOAD LATEST BACKUP
      # ============================================
      - name: Download Latest Backup
        uses: actions/download-artifact@v4
        with:
          name: minecraft-backup
          path: server/
        continue-on-error: true
      
      # ============================================
      # 🛠️ COMPLETE SERVER SETUP
      # ============================================
      - name: Complete Server Setup
        run: |
          mkdir -p server
          cd server
          
          # Create all folders
          mkdir -p plugins
          mkdir -p world
          mkdir -p world_nether
          mkdir -p world_the_end
          mkdir -p logs
          mkdir -p config
          
          # Copy uploaded plugins
          echo "📦 Copying plugins..."
          cp ../*.jar plugins/ 2>/dev/null || true
          
          # Download Playit Agent
          echo "📥 Downloading Playit Agent..."
          wget -q https://playit.gg/download/playit-linux-amd64 -O playit-agent
          chmod +x playit-agent
          
          # Download Paper
          if [ ! -f "paper-1.21.4-72.jar" ]; then
            echo "📥 Downloading Paper..."
            wget -q https://api.papermc.io/v2/projects/paper/versions/1.21.4/builds/72/downloads/paper-1.21.4-72.jar
          fi
          
          # Accept EULA
          echo "eula=true" > eula.txt
          
          # Complete server.properties
          cat > server.properties << 'EOF'
          # Minecraft server properties
          server-port=25565
          max-players=20
          view-distance=10
          simulation-distance=6
          gamemode=0
          difficulty=2
          spawn-protection=16
          online-mode=false
          force-gamemode=false
          allow-flight=true
          allow-nether=true
          allow-end=true
          level-name=world
          level-type=default
          motd=Welcome to Paper Server! 🚀
          enable-query=true
          enable-rcon=false
          max-tick-time=60000
          network-compression-threshold=256
          EOF
          
          # Create server-icon.png
          echo "iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAI0lEQVR4nO3BAQ0AAADCoPdPbQ43oAAAAAAAAAAAAG4NFeAAAW2v83YAAAAASUVORK5CYII=" | base64 -d > server-icon.png
          
          echo "========================================="
          echo "📦 SERVER SETUP COMPLETE"
          echo "========================================="
          echo "📂 Plugins: $(ls plugins/ | wc -l) files"
          echo "📂 Folders: plugins, world, logs, config"
          echo "========================================="
      
      # ============================================
      # 🚀 RUN PLAYIT AGENT + SERVER
      # ============================================
      - name: Run Server
        run: |
          cd server
          
          # Start Playit agent in background
          echo "🚀 Starting Playit agent..."
          ./playit-agent &
          sleep 5
          
          # Start Paper server
          echo "🚀 Starting Paper server with 8GB RAM..."
          java -Djava.net.preferIPv4Stack=true -Xmx8G -Xms4G -jar paper-1.21.4-72.jar nogui
      
      # ============================================
      # 💾 AUTO BACKUP WITH DATE-TIME
      # ============================================
      - name: Auto Backup
        if: always()
        run: |
          BACKUP_NAME="backup-$(date +'%Y-%m-%d_%H-%M-%S')"
          echo "📦 Creating backup: $BACKUP_NAME"
          
          mkdir -p backups
          
          # Zip server folder (exclude .jar, .log, .gz)
          cd server
          zip -r "../backups/$BACKUP_NAME.zip" . -x "*.jar" "*.log" "*.gz" 2>/dev/null || true
          cd ..
          
          # Update latest backup
          cp "backups/$BACKUP_NAME.zip" "backups/latest.zip"
          
          echo "✅ Backup created: $BACKUP_NAME.zip"
          echo "📂 Backup size: $(du -h backups/$BACKUP_NAME.zip | cut -f1)"
          echo "📂 Latest backup: $(du -h backups/latest.zip | cut -f1)"
      
      # ============================================
      # 📤 UPLOAD ALL BACKUPS
      # ============================================
      - name: Upload Latest Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-backup
          path: backups/latest.zip
          retention-days: 90
      
      - name: Upload All Backups (History)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-all-backups-$(date +'%Y-%m-%d')
          path: backups/
          retention-days: 30
